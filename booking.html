      <div class="booking-page">    
        <div class="container">
            <section class="booking" id="booking-form">
            <form action="https://formsubmit.co/jadewumi35@gamil.com"
            method="post">

            <!--Hidden setting-->
            <input type="hidden" name="_captcha" value="false">
            <input type="hidden" name="_subject" value="New Apartment Booking!">
            <input type="hidden" name="_template" value="table">
            <input type="hidden" name="Apartment" value="Modern 2 Bedroom in Lekki, Lagos">
            <h1 class="main-title">Experience it for yourself</h1>

            <!--Inspection Type-->
            <div class="form-section">
            <label class="section-label">Inspection Type</label>
            <div class="choice-container">
                <input type="radio" name="Inspection" id="in-person" checked>
                <label for="in-person" class="choice-box">In-Person</label>

                <input type="radio" name="Inspection" id="Virtual Tout" checked>
                <label for="Virtual Tour" class="choice-box">Virtual Tour</label>
             </div>
            </div>

            <!--Who will attend-->
            <div class="form-section">
            <label class="section-label">Who will attend?</label>
            <div class="choice-container">
                <input type="radio" name="attendee" id="myself" checked>
                <label for="myself" class="choice-box">Myself</label>
                <input type="radio" name="attendee" id="someone else" checked>
                <label for="someone else" class="choice-box">Someone Else</label>
            </div>
            </div>

            <!--Name-->
            <label>Full Name</label>
            <input type="text" placeholder="Enter your name">

            <!--Email-->
            <label>Email Adress</label>
            <input type="email" placeholder="olivie@example.com">

            <!--Phone-->
            <label>Phone Number (Preferably WhatsApp)</label>
            <div class="phone-box">
                <span>+234</span>
                <input type="text" placeholder="Enter your phone number">
            </div>

            <!--Date-->
            <label for="start-date">Preferred Date</label>
            <input type="date" id="start-date" name="start-date">
           

            <!--Time-->
            <label>Preferred Time</label>
            <select>
                <option>Select Time</option>
                <option>9:00 Am</option>
                <option>10:00 AM</option>
                <option>12:00 PM</option>
            </select>

            <!--Relationship-->
            <label>Relationship (Optional)</label>
            <select>
                <option>Preferred Relationship</option>
                <option>Family</option>
                <option>Friend</option>
                <option>Agent</option>
            </select>
            <!--Additional-->
            <label>Addition Notes (Optional)</label>
            <textarea placeholder="Any additional information or requests." rows="4"></textarea>
            <button type="submit" class="submit-btn">Submit</button>
            </section>
        </div>
    </div>
